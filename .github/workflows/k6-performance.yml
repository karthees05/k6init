name: K6 Performance Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment name
        required: false
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod
      load_profile:
        description: Load profile
        required: false
        default: fixed
        type: choice
        options:
          - fixed
          - ramp-up
          - spike
          - peak
      users:
        description: Virtual users
        required: false
        default: '5'
      duration_seconds:
        description: Duration in seconds
        required: false
        default: '30'
      base_url:
        description: Optional base URL override
        required: false
        default: ''

jobs:
  k6:
    runs-on: ubuntu-latest
    env:
      TEST_ENV: ${{ github.event.inputs.environment || 'dev' }}
      LOAD_PROFILE: ${{ github.event.inputs.load_profile || 'fixed' }}
      USERS: ${{ github.event.inputs.users || '5' }}
      DURATION_SECONDS: ${{ github.event.inputs.duration_seconds || '30' }}
      BASE_URL: ${{ github.event.inputs.base_url || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript suite
        run: npm run build

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 suite
        uses: grafana/run-k6-action@v1
        with:
          path: dist/jsonPlaceholderSimulation.js
          flags: -e ENV=${{ env.TEST_ENV }} -e LOAD_PROFILE=${{ env.LOAD_PROFILE }} -e USERS=${{ env.USERS }} -e DURATION_SECONDS=${{ env.DURATION_SECONDS }} -e BASE_URL=${{ env.BASE_URL }}

      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports
          path: |
            k6-summary.json
            k6-summary.html
          if-no-files-found: ignore
