name: K6 Performance Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment name
        required: false
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod
      load_profile:
        description: Load profile
        required: false
        default: fixed
        type: choice
        options:
          - fixed
          - ramp-up
          - spike
          - peak
      users:
        description: Fixed profile users, or target users for ramp-up/spike/peak
        required: false
        default: '5'
      initial_users:
        description: Initial users for ramp-up/spike/peak. Ignored by fixed.
        required: false
        default: '1'
      duration_seconds:
        description: Duration in seconds
        required: false
        default: '30'
      base_url:
        description: Optional base URL override
        required: false
        default: ''
      upload_to_grafana:
        description: Upload results to Grafana Cloud k6
        required: false
        default: true
        type: boolean

jobs:
  k6:
    runs-on: ubuntu-latest
    env:
      TEST_ENV: ${{ github.event.inputs.environment || 'dev' }}
      LOAD_PROFILE: ${{ github.event.inputs.load_profile || 'fixed' }}
      USERS: ${{ github.event.inputs.users || '5' }}
      INITIAL_USERS: ${{ github.event.inputs.initial_users || '1' }}
      DURATION_SECONDS: ${{ github.event.inputs.duration_seconds || '30' }}
      BASE_URL: ${{ github.event.inputs.base_url || '' }}
      UPLOAD_TO_GRAFANA: ${{ github.event.inputs.upload_to_grafana || 'true' }}
      HAS_GRAFANA_CLOUD_CONFIG: ${{ secrets.K6_CLOUD_TOKEN != '' && secrets.K6_CLOUD_PROJECT_ID != '' }}
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript suite
        run: npm run build

      - name: Validate load profile parameters
        run: |
          case "${USERS}" in
            ''|*[!0-9]*)
              echo "users must be a positive whole number."
              exit 1
              ;;
          esac
          case "${INITIAL_USERS}" in
            ''|*[!0-9]*)
              echo "initial_users must be a positive whole number."
              exit 1
              ;;
          esac
          if [ "${LOAD_PROFILE}" != "fixed" ] && [ "${INITIAL_USERS}" -gt "${USERS}" ]; then
            echo "initial_users must be less than or equal to users for ${LOAD_PROFILE}."
            exit 1
          fi

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 suite and upload to Grafana Cloud k6
        if: env.UPLOAD_TO_GRAFANA == 'true' && env.HAS_GRAFANA_CLOUD_CONFIG == 'true'
        id: run_k6_cloud
        uses: grafana/run-k6-action@v1
        env:
          K6_CLOUD_TOKEN: ${{ env.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ env.K6_CLOUD_PROJECT_ID }}
        with:
          path: dist/jsonPlaceholderSimulation.js
          cloud-run-locally: true
          cloud-comment-on-pr: true
          debug: true
          flags: -e ENV=${{ env.TEST_ENV }} -e LOAD_PROFILE=${{ env.LOAD_PROFILE }} -e INITIAL_USERS=${{ env.INITIAL_USERS }} -e USERS=${{ env.USERS }} -e DURATION_SECONDS=${{ env.DURATION_SECONDS }} -e BASE_URL=${{ env.BASE_URL }}

      - name: Print Grafana Cloud k6 run IDs
        if: env.UPLOAD_TO_GRAFANA == 'true' && env.HAS_GRAFANA_CLOUD_CONFIG == 'true'
        run: echo "Grafana Cloud k6 test run IDs - ${TEST_RUN_IDS}"
        env:
          TEST_RUN_IDS: ${{ steps.run_k6_cloud.outputs.testRunIds }}

      - name: Run k6 suite locally only
        if: env.UPLOAD_TO_GRAFANA != 'true' || env.HAS_GRAFANA_CLOUD_CONFIG != 'true'
        uses: grafana/run-k6-action@v1
        with:
          path: dist/jsonPlaceholderSimulation.js
          debug: true
          flags: -e ENV=${{ env.TEST_ENV }} -e LOAD_PROFILE=${{ env.LOAD_PROFILE }} -e INITIAL_USERS=${{ env.INITIAL_USERS }} -e USERS=${{ env.USERS }} -e DURATION_SECONDS=${{ env.DURATION_SECONDS }} -e BASE_URL=${{ env.BASE_URL }}

      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports
          path: |
            k6-summary.json
            k6-summary.html
          if-no-files-found: ignore
